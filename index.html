<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ZapCmd</title>
    <script>
      (function () {
        var themeBootstrap = {
          obsidian: { colorScheme: "dark" },
          linen: { colorScheme: "light" }
        };

        try {
          var stored = JSON.parse(
            localStorage.getItem("zapcmd.settings") || "{}"
          );
          var theme =
            stored &&
            stored.appearance &&
            typeof stored.appearance.theme === "string"
              ? stored.appearance.theme
              : "obsidian";
          var blur =
            stored &&
            stored.appearance &&
            stored.appearance.blurEnabled !== false;
          var resolvedTheme = themeBootstrap[theme] ? theme : "obsidian";
          var bootstrap = themeBootstrap[resolvedTheme];
          document.documentElement.dataset.theme = resolvedTheme;
          document.documentElement.dataset.blur = blur ? "on" : "off";
          document.documentElement.style.colorScheme = bootstrap.colorScheme;
        } catch (e) {
          document.documentElement.dataset.theme = "obsidian";
          document.documentElement.dataset.blur = "on";
          document.documentElement.style.colorScheme = themeBootstrap.obsidian.colorScheme;
        }
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
