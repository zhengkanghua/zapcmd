<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ZapCmd Visual</title>
    <script>
      // 视觉回归专用入口：强制固定主题，避免本机 localStorage 导致截图漂移。
      ;(function () {
        document.documentElement.dataset.theme = "obsidian";
        document.documentElement.dataset.blur = "on";
        document.documentElement.style.colorScheme = "dark";
        document.documentElement.style.backgroundColor = "#0b0b0c";
        var style = document.createElement("style");
        style.textContent = "html,body,#app{background:#0b0b0c;} html{color-scheme:dark;}";
        document.head.appendChild(style);
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main-visual.ts"></script>
  </body>
</html>
