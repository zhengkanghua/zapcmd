meta:
  name: 文件操作
  moduleSlug: file
commands:
  - id: find-file
    name: 按名称查找文件
    category: file
    platform: mac/linux
    exec:
      program: find
      args:
        - "{{path}}"
        - -name
      stdinArgKey: pattern
    adminRequired: false
    args:
      - key: path
        label: path
        type: path
        required: true
        default: .
      - key: pattern
        label: pattern
        type: text
        required: true
    tags:
      - 文件
      - file
      - 查找
      - find
  - id: find-file-win
    name: 按名称查找文件
    category: file
    platform: win
    script:
      runner: powershell
      command: Get-ChildItem -Recurse -Filter "{{pattern}}" {{path}}
    adminRequired: false
    args:
      - key: path
        label: path
        type: path
        required: true
        default: .
      - key: pattern
        label: pattern
        type: text
        required: true
    prerequisites:
      - id: powershell
        type: shell
        required: true
        check: shell:powershell
    tags:
      - 文件
      - file
      - 查找
      - find
  - id: find-content
    name: 按内容搜索文件
    category: file
    platform: mac/linux
    exec:
      program: grep
      args:
        - -rn
        - "{{path}}"
      stdinArgKey: pattern
    adminRequired: false
    args:
      - key: pattern
        label: pattern
        type: text
        required: true
      - key: path
        label: path
        type: path
        required: true
        default: .
    tags:
      - 文件
      - file
      - 查找
      - find
      - 内容
      - content
  - id: find-content-win
    name: 按内容搜索文件
    category: file
    platform: win
    script:
      runner: powershell
      command: Select-String -Recurse -Pattern "{{pattern}}" -Path "{{path}}"
    adminRequired: false
    args:
      - key: pattern
        label: pattern
        type: text
        required: true
      - key: path
        label: path
        type: path
        required: true
        default: .
    prerequisites:
      - id: powershell
        type: shell
        required: true
        check: shell:powershell
    tags:
      - 文件
      - file
      - 查找
      - find
      - 内容
      - content
  - id: list-files
    name: 列出目录内容
    category: file
    platform: mac/linux
    exec:
      program: ls
      args:
        - -la
        - "{{path}}"
    adminRequired: false
    args:
      - key: path
        label: path
        type: path
        required: true
        default: .
    tags:
      - 文件
      - file
      - 列表
      - list
      - files
      - 目录
      - directory
  - id: list-files-win
    name: 列出目录内容
    category: file
    platform: win
    script:
      runner: powershell
      command: Get-ChildItem -Force {{path}}
    adminRequired: false
    args:
      - key: path
        label: path
        type: path
        required: true
        default: .
    prerequisites:
      - id: powershell
        type: shell
        required: true
        check: shell:powershell
    tags:
      - 文件
      - file
      - 列表
      - list
      - files
      - 目录
      - directory
  - id: tree
    name: 目录树结构
    category: file
    platform: mac/linux
    exec:
      program: tree
      args:
        - -L
        - "{{depth}}"
        - "{{path}}"
    adminRequired: false
    args:
      - key: path
        label: path
        type: path
        required: true
        default: .
      - key: depth
        label: depth
        type: number
        required: true
        default: "3"
        validation:
          min: 1
          max: 10
    prerequisites:
      - id: tree
        type: binary
        required: true
        check: binary:tree
    tags:
      - 文件
      - file
      - 树
      - tree
      - 目录
      - directory
  - id: tree-win
    name: 目录树结构
    category: file
    platform: win
    exec:
      program: tree
      args:
        - /F
        - "{{path}}"
    adminRequired: false
    args:
      - key: path
        label: path
        type: path
        required: true
        default: .
    tags:
      - 文件
      - file
      - 树
      - tree
      - 目录
      - directory
  - id: file-size
    name: 查看文件大小
    category: file
    platform: mac/linux
    exec:
      program: ls
      args:
        - -lh
        - "{{file}}"
    adminRequired: false
    args:
      - key: file
        label: file
        type: path
        required: true
    tags:
      - 文件
      - file
      - 大小
      - size
      - 查看
      - show
  - id: file-count
    name: 统计文件数量
    category: file
    platform: mac/linux
    script:
      runner: bash
      command: find {{path}} -type f | wc -l
    adminRequired: false
    args:
      - key: path
        label: path
        type: path
        required: true
        default: .
    prerequisites:
      - id: bash
        type: shell
        required: true
        check: shell:bash
    tags:
      - 文件
      - file
      - count
  - id: file-permissions
    name: 修改文件权限
    category: file
    platform: mac/linux
    exec:
      program: chmod
      args:
        - "{{mode}}"
        - "{{file}}"
    adminRequired: false
    args:
      - key: mode
        label: mode
        type: text
        required: true
      - key: file
        label: file
        type: path
        required: true
    tags:
      - 文件
      - file
      - 权限
      - permissions
  - id: file-owner
    name: 修改文件所有者
    category: file
    platform: mac/linux
    exec:
      program: chown
      args:
        - "{{owner}}"
        - "{{file}}"
    adminRequired: false
    args:
      - key: owner
        label: owner
        type: text
        required: true
      - key: file
        label: file
        type: path
        required: true
    tags:
      - 文件
      - file
      - 所有者
      - owner
  - id: compress-tar
    name: 打包压缩 (tar.gz)
    category: file
    platform: mac/linux
    exec:
      program: tar
      args:
        - -czf
        - "{{output}}.tar.gz"
        - "{{input}}"
    adminRequired: false
    args:
      - key: input
        label: input
        type: path
        required: true
      - key: output
        label: output
        type: text
        required: true
    tags:
      - 文件
      - file
      - 压缩
      - compress
      - tar
  - id: extract-tar
    name: 解压 (tar.gz)
    category: file
    platform: mac/linux
    exec:
      program: tar
      args:
        - -xzf
        - "{{file}}"
    adminRequired: false
    args:
      - key: file
        label: file
        type: path
        required: true
    tags:
      - 文件
      - file
      - 解压
      - extract
      - tar
  - id: compress-zip
    name: ZIP 压缩
    category: file
    platform: mac/linux
    exec:
      program: zip
      args:
        - -r
        - "{{output}}.zip"
        - "{{input}}"
    adminRequired: false
    args:
      - key: input
        label: input
        type: path
        required: true
      - key: output
        label: output
        type: text
        required: true
    prerequisites:
      - id: zip
        type: binary
        required: true
        check: binary:zip
    tags:
      - 文件
      - file
      - 压缩
      - compress
      - zip
  - id: extract-zip
    name: ZIP 解压
    category: file
    platform: mac/linux
    exec:
      program: unzip
      args:
        - "{{file}}"
        - -d
        - "{{dest}}"
    adminRequired: false
    args:
      - key: file
        label: file
        type: path
        required: true
      - key: dest
        label: dest
        type: path
        required: true
        default: .
    prerequisites:
      - id: unzip
        type: binary
        required: true
        check: binary:unzip
    tags:
      - 文件
      - file
      - 解压
      - extract
      - zip
  - id: compress-zip-win
    name: ZIP 压缩
    category: file
    platform: win
    script:
      runner: powershell
      command: Compress-Archive -Path "{{input}}" -DestinationPath "{{output}}.zip"
        -Force
    adminRequired: false
    args:
      - key: input
        label: input
        type: path
        required: true
      - key: output
        label: output
        type: text
        required: true
    prerequisites:
      - id: powershell
        type: shell
        required: true
        check: shell:powershell
    tags:
      - 文件
      - file
      - 压缩
      - compress
      - zip
  - id: extract-zip-win
    name: ZIP 解压
    category: file
    platform: win
    script:
      runner: powershell
      command: Expand-Archive -Path "{{file}}" -DestinationPath "{{dest}}" -Force
    adminRequired: false
    args:
      - key: file
        label: file
        type: path
        required: true
      - key: dest
        label: dest
        type: path
        required: true
        default: .
    prerequisites:
      - id: powershell
        type: shell
        required: true
        check: shell:powershell
    tags:
      - 文件
      - file
      - 解压
      - extract
      - zip
  - id: watch-file
    name: 监听文件变化
    category: file
    platform: mac/linux
    exec:
      program: fswatch
      args:
        - "{{path}}"
    adminRequired: false
    args:
      - key: path
        label: path
        type: path
        required: true
    prerequisites:
      - id: fswatch
        type: binary
        required: true
        check: binary:fswatch
    tags:
      - 文件
      - file
      - 监听
      - watch
  - id: tail-log
    name: 实时查看日志
    category: file
    platform: mac/linux
    exec:
      program: tail
      args:
        - -f
        - "{{file}}"
    adminRequired: false
    args:
      - key: file
        label: file
        type: path
        required: true
    tags:
      - 文件
      - file
      - tail
      - 日志
      - log
      - 查看
      - show
  - id: tail-log-win
    name: 实时查看日志
    category: file
    platform: win
    script:
      runner: powershell
      command: Get-Content -Path "{{file}}" -Tail {{lines}} -Wait
    adminRequired: false
    args:
      - key: file
        label: file
        type: path
        required: true
      - key: lines
        label: lines
        type: number
        required: true
        default: "100"
        validation:
          min: 1
          max: 10000
    prerequisites:
      - id: powershell
        type: shell
        required: true
        check: shell:powershell
    tags:
      - 文件
      - file
      - tail
      - 日志
      - log
      - 查看
      - show
  - id: head-file
    name: 查看文件前 N 行
    category: file
    platform: mac/linux
    exec:
      program: head
      args:
        - -n
        - "{{lines}}"
        - "{{file}}"
    adminRequired: false
    args:
      - key: file
        label: file
        type: path
        required: true
      - key: lines
        label: lines
        type: number
        required: true
        default: "20"
        validation:
          min: 1
          max: 10000
    tags:
      - 文件
      - file
      - head
      - 查看
      - show
  - id: head-file-win
    name: 查看文件前 N 行
    category: file
    platform: win
    script:
      runner: powershell
      command: Get-Content -Path "{{file}}" -TotalCount {{lines}}
    adminRequired: false
    args:
      - key: file
        label: file
        type: path
        required: true
      - key: lines
        label: lines
        type: number
        required: true
        default: "20"
        validation:
          min: 1
          max: 10000
    prerequisites:
      - id: powershell
        type: shell
        required: true
        check: shell:powershell
    tags:
      - 文件
      - file
      - head
      - 查看
      - show
  - id: wc-lines
    name: 统计文件行数
    category: file
    platform: mac/linux
    exec:
      program: wc
      args:
        - -l
        - "{{file}}"
    adminRequired: false
    args:
      - key: file
        label: file
        type: path
        required: true
    tags:
      - 文件
      - file
      - 行数
      - wc
      - 行
      - lines
  - id: wc-lines-win
    name: 统计文件行数
    category: file
    platform: win
    script:
      runner: powershell
      command: (Get-Content -Path "{{file}}" | Measure-Object -Line).Lines
    adminRequired: false
    args:
      - key: file
        label: file
        type: path
        required: true
    prerequisites:
      - id: powershell
        type: shell
        required: true
        check: shell:powershell
    tags:
      - 文件
      - file
      - 行数
      - wc
      - 行
      - lines
