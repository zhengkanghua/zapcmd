meta:
  name: Postgres
  moduleSlug: postgres
commands:
  - id: psql-shell
    name: Postgres Shell
    category: postgres
    platform: all
    exec:
      program: psql
      args:
        - -h
        - "{{host}}"
        - -p
        - "{{port}}"
        - -U
        - "{{user}}"
        - -d
        - "{{database}}"
    adminRequired: false
    args:
      - key: host
        label: host
        type: text
        required: true
        default: 127.0.0.1
      - key: port
        label: port
        type: number
        required: true
        default: "5432"
        validation:
          min: 1
          max: 65535
      - key: user
        label: user
        type: text
        required: true
        default: postgres
      - key: database
        label: database
        type: text
        required: true
        default: postgres
    prerequisites:
      - id: psql
        type: binary
        required: true
        check: binary:psql
    tags:
      - postgres
      - psql
      - shell
      - cli
      - 入口
      - 控制台
  - id: postgres-is-ready
    name: Postgres 就绪检查
    category: postgres
    platform: all
    exec:
      program: pg_isready
      args:
        - -h
        - "{{host}}"
        - -p
        - "{{port}}"
    adminRequired: false
    args:
      - key: host
        label: host
        type: text
        required: true
        default: 127.0.0.1
      - key: port
        label: port
        type: number
        required: true
        default: "5432"
        validation:
          min: 1
          max: 65535
    prerequisites:
      - id: pg_isready
        type: binary
        required: true
        check: binary:pg_isready
    tags:
      - postgres
      - ready
      - health
      - 检查
