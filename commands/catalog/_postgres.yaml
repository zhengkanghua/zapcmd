  - id: postgres-active-queries
    name: Postgres 活跃查询
    category: postgres
    platform: all
    script:
      runner: bash
      command: psql -h {{host}} -p {{port}} -U {{user}} -d {{database}} -c "SELECT
        pid, usename, state, wait_event_type, wait_event, query FROM
        pg_stat_activity WHERE state <> 'idle' ORDER BY query_start DESC;"
