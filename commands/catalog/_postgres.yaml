        label: user
        type: text
        required: true
        default: postgres
      - key: database
        label: database
        type: text
        required: true
        default: postgres
      - key: table
        label: table
        type: text
        required: true
    prerequisites:
      - id: psql
        type: binary
        required: true
        check: binary:psql
    tags:
      - postgres
      - describe
      - table
      - schema
  - id: postgres-query
    name: Postgres 执行 SQL
    category: postgres
    platform: all
    exec:
      program: psql
      args:
        - -h
        - "{{host}}"
        - -p
        - "{{port}}"
        - -U
        - "{{user}}"
        - -d
        - "{{database}}"
        - -c
      stdinArgKey: sql
    adminRequired: false
    args:
      - key: host
        label: host
        type: text
        required: true
        default: 127.0.0.1
      - key: port
        label: port
        type: number
        required: true
        default: "5432"
        validation:
          min: 1
          max: 65535
      - key: user
        label: user
        type: text
        required: true
        default: postgres
      - key: database
        label: database
        type: text
        required: true
        default: postgres
      - key: sql
        label: sql
        type: text
        required: true
    prerequisites:
      - id: psql
        type: binary
        required: true
        check: binary:psql
    tags:
      - postgres
      - query
      - sql
      - database
  - id: postgres-dump
    name: Postgres 导出数据库
    category: postgres
    platform: all
    exec:
      program: pg_dump
      args:
        - -h
        - "{{host}}"
        - -p
        - "{{port}}"
        - -U
        - "{{user}}"
        - -d
        - "{{database}}"
        - -f
        - '"{{output}}"'
    adminRequired: false
    args:
      - key: host
        label: host
        type: text
        required: true
        default: 127.0.0.1
      - key: port
        label: port
        type: number
        required: true
        default: "5432"
        validation:
          min: 1
          max: 65535
      - key: user
        label: user
        type: text
        required: true
        default: postgres
      - key: database
        label: database
        type: text
        required: true
        default: postgres
      - key: output
        label: output
        type: path
        required: true
    prerequisites:
      - id: pg_dump
        type: binary
        required: true
        check: binary:pg_dump
    tags:
      - postgres
      - dump
      - export
      - backup
      - database
  - id: postgres-restore
