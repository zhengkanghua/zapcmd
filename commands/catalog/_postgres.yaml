      - key: user
        label: user
        type: text
        required: true
        default: postgres
    prerequisites:
      - id: psql
        type: binary
        required: true
        check: binary:psql
    tags:
      - postgres
      - list
      - databases
      - 数据库
      - 列表
  - id: postgres-list-tables
    name: Postgres 列出数据表
