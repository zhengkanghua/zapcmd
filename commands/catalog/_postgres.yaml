      - import
      - sql
      - database
  - id: postgres-create-database
    name: Postgres 创建数据库
    category: postgres
    platform: all
    script:
      runner: bash
      command: psql -h {{host}} -p {{port}} -U {{user}} -d postgres -c "CREATE
        DATABASE {{database}};"
    adminRequired: false
    args:
      - key: host
        label: host
        type: text
        required: true
        default: 127.0.0.1
      - key: port
        label: port
        type: number
        required: true
        default: "5432"
        validation:
          min: 1
          max: 65535
      - key: user
        label: user
        type: text
        required: true
        default: postgres
      - key: database
        label: database
        type: text
        required: true
    prerequisites:
      - id: psql
        type: binary
        required: true
        check: binary:psql
      - id: bash
        type: shell
        required: true
        check: shell:bash
    tags:
      - postgres
      - create
      - database
  - id: postgres-drop-database
