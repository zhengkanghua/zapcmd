meta:
  moduleSlug: redis
commands:
  - id: redis-shell
    category: redis
    platform: all
    exec:
      program: redis-cli
      args: []
    adminRequired: false
    prerequisites:
      - id: redis-cli
        type: binary
        required: true
        check: binary:redis-cli
    tags:
      - redis
      - shell
      - cli
      - 入口
      - 控制台
  - id: redis-ping
    category: redis
    platform: all
    exec:
      program: redis-cli
      args:
        - ping
    adminRequired: false
    prerequisites:
      - id: redis-cli
        type: binary
        required: true
        check: binary:redis-cli
    tags:
      - redis
      - ping
      - 健康检查
      - health
  - id: redis-info
    category: redis
    platform: all
    exec:
      program: redis-cli
      args:
