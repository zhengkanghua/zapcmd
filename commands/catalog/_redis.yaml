      - redis
      - del
      - 删除
      - delete
      - key
  - id: redis-exists
    category: redis
    platform: all
    exec:
      program: redis-cli
      args:
        - exists
        - '"{{key}}"'
    adminRequired: false
    args:
      - key: key
        type: text
        required: true
    prerequisites:
      - id: redis-cli
        type: binary
        required: true
        check: binary:redis-cli
    tags:
      - redis
      - exists
      - key
  - id: redis-expire
    category: redis
    platform: all
    exec:
      program: redis-cli
      args:
        - expire
        - '"{{key}}"'
        - "{{seconds}}"
    adminRequired: false
    args:
      - key: key
        type: text
        required: true
      - key: seconds
        type: number
        required: true
        default: "60"
        validation:
          min: 1
          max: 86400
    prerequisites:
      - id: redis-cli
        type: binary
        required: true
        check: binary:redis-cli
    tags:
      - redis
      - expire
      - ttl
      - seconds
      - key
  - id: redis-ttl
    category: redis
    platform: all
    exec:
      program: redis-cli
      args:
        - ttl
        - '"{{key}}"'
    adminRequired: false
    args:
