    prerequisites:
      - id: redis-cli
        type: binary
        required: true
        check: binary:redis-cli
    tags:
      - redis
      - info
      - 信息
  - id: redis-get
    category: redis
    platform: all
    exec:
      program: redis-cli
      args:
        - get
        - '"{{key}}"'
    adminRequired: false
    args:
      - key: key
        type: text
        required: true
    prerequisites:
      - id: redis-cli
        type: binary
        required: true
        check: binary:redis-cli
    tags:
      - redis
      - get
      - 查询
      - query
      - key
  - id: redis-set
    category: redis
    platform: all
    exec:
      program: redis-cli
      args:
        - set
        - '"{{key}}"'
        - '"{{value}}"'
    adminRequired: false
    args:
      - key: key
        type: text
        required: true
      - key: value
        type: text
        required: true
    prerequisites:
      - id: redis-cli
        type: binary
        required: true
        check: binary:redis-cli
    tags:
      - redis
      - set
      - 写入
      - write
      - key
      - value
  - id: redis-del
    category: redis
    platform: all
    exec:
      program: redis-cli
      args:
        - del
        - '"{{key}}"'
    adminRequired: false
    args:
      - key: key
        type: text
        required: true
    prerequisites:
      - id: redis-cli
        type: binary
        required: true
        check: binary:redis-cli
