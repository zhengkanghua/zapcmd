    tags:
      - redis
      - ttl
      - key
  - id: redis-scan
    category: redis
    platform: all
    exec:
      program: redis-cli
      args:
        - --scan
        - --pattern
        - --count
        - "{{count}}"
      stdinArgKey: pattern
    adminRequired: false
    args:
      - key: pattern
        type: text
        required: true
        default: "*"
      - key: count
        type: number
        required: true
        default: "100"
        validation:
          min: 1
          max: 1000
    prerequisites:
      - id: redis-cli
        type: binary
        required: true
        check: binary:redis-cli
    tags:
      - redis
      - scan
      - 查询
      - query
      - pattern
