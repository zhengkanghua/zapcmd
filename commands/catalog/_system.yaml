meta:
  moduleSlug: system
commands:
  - id: ps-find
    category: system
    platform: mac/linux
    script:
      runner: bash
      command: ps aux | grep {{name}}
    adminRequired: false
    args:
      - key: name
        type: text
        required: true
    prerequisites:
      - id: bash
        type: shell
        required: true
        check: shell:bash
    tags:
      - 系统
      - system
      - 进程
      - ps
      - 查找
      - find
      - process
  - id: ps-find-win
    category: system
    platform: win
    script:
      runner: cmd
      command: tasklist | findstr /i {{name}}
    adminRequired: false
    args:
      - key: name
        type: text
        required: true
    prerequisites:
      - id: cmd
        type: shell
        required: true
        check: shell:cmd
    tags:
      - 系统
      - system
      - 进程
      - ps
      - 查找
      - find
      - process
  - id: kill-pid
    category: system
    platform: mac/linux
    exec:
      program: kill
      args:
        - "-9"
        - "{{pid}}"
    adminRequired: false
    dangerous: true
    args:
      - key: pid
        type: number
        required: true
        validation:
          min: 1
          max: 2147483647
    tags:
      - 系统
      - system
      - kill
      - 终止
      - 结束
      - pid
      - 进程
      - process
  - id: kill-pid-win
    category: system
    platform: win
    exec:
      program: taskkill
      args:
        - /F
        - /PID
        - "{{pid}}"
    adminRequired: false
    dangerous: true
    args:
      - key: pid
        type: number
        required: true
        validation:
          min: 1
          max: 2147483647
    tags:
      - 系统
      - system
      - kill
      - 终止
      - 结束
      - pid
      - 进程
      - process
  - id: kill-name
    category: system
    platform: mac/linux
    exec:
      program: pkill
      args:
        - -f
        - "{{name}}"
    adminRequired: false
    dangerous: true
    args:
      - key: name
        type: text
        required: true
    tags:
      - 系统
      - system
      - kill
      - 终止
      - 结束
      - 名称
      - name
      - 进程
      - process
  - id: kill-name-win
    category: system
    platform: win
    exec:
      program: taskkill
      args:
        - /F
        - /IM
        - "{{name}}"
    adminRequired: false
    dangerous: true
    args:
      - key: name
        type: text
        required: true
    tags:
      - 系统
      - system
      - kill
      - 终止
      - 结束
      - 名称
      - name
      - 进程
      - process
  - id: disk-usage
    category: system
    platform: mac/linux
    exec:
      program: df
      args:
        - -h
    adminRequired: false
    tags:
      - 系统
      - system
      - 磁盘
      - disk
      - 使用率
      - usage
      - 查看
      - show
  - id: disk-usage-win
    category: system
    platform: win
    script:
      runner: powershell
      command: Get-PSDrive -PSProvider FileSystem
    adminRequired: false
    prerequisites:
      - id: powershell
        type: shell
        required: true
        check: shell:powershell
    tags:
      - 系统
      - system
      - 磁盘
      - disk
      - 使用率
      - usage
      - 查看
      - show
  - id: dir-size
    category: system
    platform: mac/linux
    exec:
      program: du
      args:
        - -sh
        - "{{path}}"
    adminRequired: false
    args:
      - key: path
        type: path
        required: true
    tags:
      - 系统
      - system
      - 目录
      - directory
      - 大小
      - size
      - 查看
      - show
  - id: dir-size-win
    category: system
    platform: win
    script:
      runner: powershell
      command: (Get-ChildItem -Recurse {{path}} | Measure-Object -Property Length
        -Sum).Sum / 1MB
    adminRequired: false
    args:
      - key: path
        type: path
        required: true
    prerequisites:
      - id: powershell
        type: shell
        required: true
        check: shell:powershell
    tags:
      - 系统
      - system
      - 目录
      - directory
      - 大小
      - size
      - 查看
      - show
  - id: memory-usage
    category: system
    platform: mac
    script:
      runner: bash
      command: top -l 1 | head -n 10
    adminRequired: false
    prerequisites:
      - id: bash
        type: shell
        required: true
        check: shell:bash
    tags:
      - 系统
      - system
      - 内存
      - memory
      - 使用率
      - usage
      - 查看
      - show
  - id: memory-usage-linux
    category: system
    platform: linux
    exec:
      program: free
      args:
        - -h
    adminRequired: false
    tags:
      - 系统
      - system
      - 内存
      - memory
      - 使用率
      - usage
      - 查看
      - show
  - id: memory-usage-win
    category: system
    platform: win
    script:
      runner: powershell
      command: Get-Process | Sort-Object WorkingSet -Descending | Select-Object -First
        10 Name, @{N='Mem(MB)';E={[math]::round($_.WorkingSet/1MB,1)}}
    adminRequired: false
    prerequisites:
      - id: powershell
        type: shell
        required: true
        check: shell:powershell
    tags:
      - 系统
      - system
      - 内存
      - memory
      - 使用率
      - usage
      - 查看
      - show
  - id: system-info
    category: system
    platform: mac/linux
    exec:
      program: uname
      args:
        - -a
    adminRequired: false
    tags:
      - 系统
      - system
      - info
      - 查看
      - show
  - id: system-info-win
    category: system
    platform: win
    exec:
      program: systeminfo
      args: []
    adminRequired: false
    tags:
      - 系统
      - system
      - info
      - 查看
      - show
  - id: env-var-set
    category: system
    platform: mac/linux
    exec:
      program: export
      args:
        - "{{key}}={{value}}"
    adminRequired: false
    args:
      - key: key
        type: text
        required: true
      - key: value
        type: text
        required: true
    tags:
      - 系统
      - system
      - 环境变量
      - env
      - 变量
      - var
      - 设置
      - set
  - id: env-var-set-win
    category: system
    platform: win
    script:
      runner: powershell
      command: $env:{{key}} = "{{value}}"
    adminRequired: false
    args:
      - key: key
        type: text
        required: true
      - key: value
        type: text
        required: true
    prerequisites:
      - id: powershell
        type: shell
        required: true
        check: shell:powershell
    tags:
      - 系统
      - system
      - 环境变量
      - env
      - 变量
      - var
      - 设置
      - set
  - id: env-var-get
    category: system
    platform: mac/linux
    exec:
      program: echo
      args:
        - ${{key}}
    adminRequired: false
    args:
      - key: key
        type: text
        required: true
    tags:
      - 系统
      - system
      - 环境变量
      - env
      - 变量
      - var
      - 获取
      - get
      - 查看
      - show
  - id: env-var-get-win
    category: system
    platform: win
    script:
      runner: powershell
      command: echo $env:{{key}}
    adminRequired: false
    args:
      - key: key
        type: text
        required: true
    prerequisites:
      - id: powershell
        type: shell
        required: true
        check: shell:powershell
    tags:
      - 系统
      - system
      - 环境变量
      - env
      - 变量
      - var
      - 获取
      - get
      - 查看
      - show
  - id: uptime
    category: system
    platform: mac/linux
    exec:
      program: uptime
      args: []
    adminRequired: false
    tags:
      - 系统
      - system
      - 运行时间
      - uptime
  - id: cpu-top
    category: system
    platform: mac/linux
    exec:
      program: top
      args:
        - -o
        - cpu
        - -n
        - "10"
        - -l
        - "1"
    adminRequired: false
    tags:
      - 系统
      - system
      - cpu
      - top
      - 占用
      - 冲突
  - id: cpu-top-win
    category: system
    platform: win
    script:
      runner: powershell
      command: Get-Process | Sort-Object CPU -Descending | Select-Object -First 10
    adminRequired: false
    prerequisites:
      - id: powershell
        type: shell
        required: true
        check: shell:powershell
    tags:
      - 系统
      - system
      - cpu
      - top
      - 占用
      - 冲突
  - id: cron-list
    category: system
    platform: mac/linux
    exec:
      program: crontab
      args:
        - -l
    adminRequired: false
    prerequisites:
      - id: crontab
        type: binary
        required: true
        check: binary:crontab
    tags:
      - 系统
      - system
      - 定时任务
      - cron
      - 列表
      - list
      - 查看
      - show
  - id: hosts-edit
    category: system
    platform: mac/linux
    exec:
      program: sudo
      args:
        - nano
        - /etc/hosts
    adminRequired: true
    tags:
      - 系统
      - system
      - hosts
      - 编辑
      - edit
      - 文件
      - file
  - id: hosts-edit-win
    category: system
    platform: win
    exec:
      program: notepad
      args:
        - C:\\Windows\\System32\\drivers\\etc\\hosts
    adminRequired: true
    tags:
      - 系统
      - system
      - hosts
      - 编辑
      - edit
      - 文件
      - file
