meta:
  name: NPM
  moduleSlug: npm
commands:
  - id: npm-install
    name: NPM 安装依赖
    category: package
    platform: all
    exec:
      program: npm
      args:
        - install
        - "{{package}}"
    adminRequired: false
    args:
      - key: package
        label: package
        type: text
        required: true
    prerequisites:
      - id: npm
        type: binary
        required: true
        check: binary:npm
    tags:
      - 包管理
      - package
      - npm
      - install
      - 安装
      - 依赖
      - dependency
  - id: npm-install-dev
    name: NPM 安装开发依赖
    category: package
    platform: all
