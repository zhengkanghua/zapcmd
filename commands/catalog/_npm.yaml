meta:
  moduleSlug: npm
commands:
  - id: npm-install
    category: package
    platform: all
    exec:
      program: npm
      args:
        - install
        - "{{package}}"
    adminRequired: false
    args:
      - key: package
        type: text
        required: true
    prerequisites:
      - id: npm
        type: binary
        required: true
        check: binary:npm
    tags:
      - 包管理
      - package
      - npm
      - install
      - 安装
      - 依赖
      - dependency
