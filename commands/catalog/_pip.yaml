meta:
  moduleSlug: pip
commands:
  - id: pip-install
    category: package
    platform: all
    exec:
      program: pip
      args:
        - install
        - "{{package}}"
    adminRequired: false
    args:
      - key: package
        type: text
        required: true
    prerequisites:
      - id: pip
        type: binary
        required: true
        check: binary:pip
    tags:
      - 包管理
      - package
      - pip
      - install
      - 安装
  - id: pip-uninstall
    category: package
    platform: all
    exec:
      program: pip
      args:
        - uninstall
        - "{{package}}"
    adminRequired: false
    args:
      - key: package
        type: text
        required: true
    prerequisites:
      - id: pip
        type: binary
        required: true
        check: binary:pip
    tags:
      - 包管理
      - package
      - pip
      - 卸载
      - uninstall
  - id: pip-list
    category: package
    platform: all
    exec:
      program: pip
      args:
        - list
    adminRequired: false
    prerequisites:
      - id: pip
        type: binary
        required: true
        check: binary:pip
    tags:
      - 包管理
      - package
      - pip
      - 列表
      - list
      - 查看
      - show
      - 安装
      - install
  - id: pip-freeze
    category: package
    platform: all
    script:
      runner: bash
      command: pip freeze > requirements.txt
    adminRequired: false
    prerequisites:
      - id: pip
        type: binary
        required: true
        check: binary:pip
      - id: bash
        type: shell
        required: true
        check: shell:bash
    tags:
      - 包管理
      - package
      - pip
      - freeze
      - 依赖
      - dependency
