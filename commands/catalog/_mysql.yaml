      - key: database
        type: text
        required: true
        default: mysql
      - key: sql
        type: text
        required: true
    prerequisites:
      - id: mysql
        type: binary
        required: true
        check: binary:mysql
    tags:
      - mysql
      - query
      - sql
      - database
