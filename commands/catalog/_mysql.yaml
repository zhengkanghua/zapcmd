meta:
  moduleSlug: mysql
commands:
  - id: mysql-shell
    category: mysql
    platform: all
    exec:
      program: mysql
      args:
        - -h
        - "{{host}}"
        - -P
        - "{{port}}"
        - -u
        - "{{user}}"
        - -p
    adminRequired: false
    args:
      - key: host
        type: text
        required: true
        default: 127.0.0.1
      - key: port
        type: number
        required: true
        default: "3306"
        validation:
          min: 1
          max: 65535
      - key: user
        type: text
        required: true
        default: root
    prerequisites:
      - id: mysql
        type: binary
        required: true
        check: binary:mysql
    tags:
      - mysql
      - shell
      - cli
      - 入口
      - 控制台
  - id: mysql-ping
    category: mysql
    platform: all
    exec:
      program: mysqladmin
      args:
        - -h
        - "{{host}}"
        - -P
        - "{{port}}"
        - -u
        - "{{user}}"
