        - -p
    adminRequired: false
    args:
      - key: host
        type: text
        required: true
        default: 127.0.0.1
      - key: port
        type: number
        required: true
        default: "3306"
        validation:
          min: 1
          max: 65535
      - key: user
        type: text
        required: true
        default: root
    prerequisites:
      - id: mysqladmin
        type: binary
        required: true
        check: binary:mysqladmin
    tags:
      - mysql
      - ping
      - 健康检查
      - health
