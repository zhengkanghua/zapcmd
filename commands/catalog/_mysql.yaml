      program: mysql
      args:
        - -h
        - "{{host}}"
        - -P
        - "{{port}}"
        - -u
        - "{{user}}"
        - -p
        - -D
        - "{{database}}"
        - -e
      stdinArgKey: sql
    adminRequired: false
    args:
      - key: host
        type: text
        required: true
        default: 127.0.0.1
      - key: port
        type: number
        required: true
