  - id: kubectl-port-forward
    category: kubernetes
    platform: all
    exec:
      program: kubectl
      args:
        - port-forward
        - "{{resource}}"
        - "{{localPort}}:{{remotePort}}"
        - -n
        - "{{namespace}}"
    adminRequired: false
    args:
      - key: resource
        type: text
        required: true
        default: deployment/my-app
      - key: localPort
        type: number
        required: true
        default: "8080"
        validation:
          min: 1
          max: 65535
      - key: remotePort
        type: number
        required: true
        default: "80"
        validation:
          min: 1
          max: 65535
      - key: namespace
        type: text
        required: true
        default: default
    prerequisites:
      - id: kubectl
        type: binary
        required: true
        check: binary:kubectl
    tags:
