meta:
  moduleSlug: cargo
commands:
  - id: cargo-build
    category: package
    platform: all
    exec:
      program: cargo
      args:
        - build
        - --release
    adminRequired: false
    prerequisites:
      - id: cargo
        type: binary
        required: true
        check: binary:cargo
    tags:
      - 包管理
      - package
      - cargo
      - 构建
      - build
  - id: cargo-run
    category: package
    platform: all
    exec:
      program: cargo
      args:
        - run
    adminRequired: false
    prerequisites:
      - id: cargo
        type: binary
        required: true
        check: binary:cargo
    tags:
      - 包管理
      - package
      - cargo
      - 运行
      - run
  - id: cargo-test
    category: package
    platform: all
    exec:
      program: cargo
      args:
        - test
    adminRequired: false
    prerequisites:
      - id: cargo
        type: binary
        required: true
        check: binary:cargo
    tags:
      - 包管理
      - package
      - cargo
      - test
      - 测试
  - id: cargo-add
    category: package
    platform: all
    exec:
      program: cargo
      args:
        - add
        - "{{package}}"
    adminRequired: false
    args:
      - key: package
        type: text
        required: true
    prerequisites:
      - id: cargo
        type: binary
        required: true
        check: binary:cargo
    tags:
      - 包管理
      - package
      - cargo
      - 添加
      - add
      - 依赖
      - dependency
