    name: 查看容器日志
    category: docker
    platform: all
    exec:
      program: docker
      args:
        - logs
        - --tail
        - "{{lines}}"
        - "{{container}}"
    adminRequired: false
    args:
      - key: container
        label: container
        type: text
        required: true
      - key: lines
        label: lines
        type: number
        required: true
        default: "100"
        validation:
          min: 1
          max: 10000
    prerequisites:
      - id: docker
        type: binary
        required: true
        check: binary:docker
    tags:
      - docker
      - 容器
      - 日志
      - logs
