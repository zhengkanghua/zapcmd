    name: 运行容器
    category: docker
    platform: all
    exec:
      program: docker
      args:
        - run
        - -d
        - --name
        - "{{name}}"
        - -p
        - "{{ports}}"
        - "{{image}}"
    adminRequired: false
    args:
      - key: image
        label: image
        type: text
        required: true
      - key: name
        label: name
        type: text
        required: true
      - key: ports
        label: ports
