    exec:
      program: docker
      args:
        - ps
        - -a
    adminRequired: false
    prerequisites:
      - id: docker
        type: binary
        required: true
        check: binary:docker
    tags:
      - docker
      - 容器
      - 进程
      - ps
      - 全部
      - all
      - 查看
      - show
      - container
  - id: docker-images
