meta:
  name: Docker 容器管理
  moduleSlug: docker
commands:
  - id: docker-ps
    name: 查看运行中容器
    category: docker
    platform: all
    exec:
      program: docker
      args:
        - ps
    adminRequired: false
    prerequisites:
      - id: docker
        type: binary
        required: true
        check: binary:docker
    tags:
      - docker
      - 容器
      - 进程
      - ps
      - 查看
      - show
      - container
  - id: docker-ps-all
    name: 查看所有容器
