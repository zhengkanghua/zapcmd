meta:
  moduleSlug: ssh
commands:
  - id: ssh-connect
    category: ssh
    platform: all
    exec:
      program: ssh
      args:
        - "{{user}}@{{host}}"
    adminRequired: false
    args:
      - key: user
        type: text
        required: true
      - key: host
        type: text
        required: true
    prerequisites:
      - id: ssh
        type: binary
        required: true
        check: binary:ssh
    tags:
      - ssh
      - 远程
      - 连接
      - connect
  - id: ssh-connect-port
    category: ssh
    platform: all
    exec:
      program: ssh
      args:
        - -p
        - "{{port}}"
        - "{{user}}@{{host}}"
    adminRequired: false
    args:
      - key: user
        type: text
        required: true
      - key: host
        type: text
        required: true
      - key: port
        type: number
        required: true
        validation:
          min: 1
          max: 65535
    prerequisites:
      - id: ssh
        type: binary
        required: true
        check: binary:ssh
    tags:
      - ssh
      - 远程
      - 连接
      - connect
      - 端口
      - port
  - id: ssh-connect-key
    category: ssh
    platform: all
    exec:
      program: ssh
      args:
        - -i
        - "{{key}}"
        - "{{user}}@{{host}}"
    adminRequired: false
    args:
      - key: key
        type: path
        required: true
      - key: user
        type: text
        required: true
      - key: host
        type: text
        required: true
    prerequisites:
      - id: ssh
        type: binary
        required: true
        check: binary:ssh
    tags:
      - ssh
      - 远程
      - 连接
      - connect
      - 密钥
      - key
  - id: scp-upload
    category: ssh
    platform: all
    exec:
      program: scp
      args:
        - "{{local}}"
        - "{{user}}@{{host}}:{{remote}}"
    adminRequired: false
    args:
      - key: local
        type: path
        required: true
      - key: user
        type: text
        required: true
      - key: host
        type: text
        required: true
      - key: remote
        type: text
        required: true
    prerequisites:
      - id: scp
        type: binary
        required: true
        check: binary:scp
    tags:
      - ssh
      - 远程
      - scp
      - upload
      - 上传
      - 文件
      - file
  - id: scp-download
    category: ssh
    platform: all
    exec:
      program: scp
      args:
        - "{{user}}@{{host}}:{{remote}}"
        - "{{local}}"
    adminRequired: false
    args:
      - key: user
        type: text
        required: true
      - key: host
        type: text
        required: true
      - key: remote
        type: text
        required: true
      - key: local
        type: path
        required: true
    prerequisites:
      - id: scp
        type: binary
        required: true
        check: binary:scp
    tags:
      - ssh
      - 远程
      - scp
      - 下载
      - download
      - 文件
      - file
  - id: ssh-keygen
    category: ssh
    platform: all
    exec:
      program: ssh-keygen
      args:
        - -t
        - ed25519
        - -C
        - '"{{email}}"'
    adminRequired: false
    args:
      - key: email
        type: text
        required: true
    prerequisites:
      - id: ssh-keygen
        type: binary
        required: true
        check: binary:ssh-keygen
    tags:
      - ssh
      - 远程
      - 生成密钥
      - keygen
      - 密钥
      - key
  - id: ssh-copy-id
    category: ssh
    platform: mac/linux
    exec:
      program: ssh-copy-id
      args:
        - "{{user}}@{{host}}"
    adminRequired: false
    args:
      - key: user
        type: text
        required: true
      - key: host
        type: text
        required: true
    prerequisites:
      - id: ssh-copy-id
        type: binary
        required: true
        check: binary:ssh-copy-id
    tags:
      - ssh
      - 远程
      - copy
      - id
  - id: ssh-tunnel
    category: ssh
    platform: all
    exec:
      program: ssh
      args:
        - -L
        - "{{local_port}}:{{target_host}}:{{target_port}}"
        - "{{user}}@{{host}}"
    adminRequired: false
    args:
      - key: local_port
        type: number
        required: true
        validation:
          min: 1
          max: 65535
      - key: target_host
        type: text
        required: true
      - key: target_port
        type: number
        required: true
        validation:
          min: 1
          max: 65535
      - key: user
        type: text
        required: true
      - key: host
        type: text
        required: true
    prerequisites:
      - id: ssh
        type: binary
        required: true
        check: binary:ssh
    tags:
      - ssh
      - 远程
      - 隧道
      - tunnel
      - 端口
      - port
  - id: ssh-config-list
    category: ssh
    platform: all
    exec:
      program: cat
      args:
        - ~/.ssh/config
    adminRequired: false
    tags:
      - ssh
      - 远程
      - 配置
      - config
      - 列表
      - list
      - 查看
      - show
  - id: ssh-agent-add
    category: ssh
    platform: all
    exec:
      program: ssh-add
      args:
        - "{{key}}"
    adminRequired: false
    args:
      - key: key
        type: path
        required: true
        default: ~/.ssh/id_ed25519
    prerequisites:
      - id: ssh-add
        type: binary
        required: true
        check: binary:ssh-add
    tags:
      - ssh
      - 远程
      - agent
      - 添加
      - add
      - 密钥
      - key
