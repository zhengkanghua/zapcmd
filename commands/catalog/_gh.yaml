meta:
  name: GitHub CLI
  moduleSlug: gh
commands:
  - id: gh-auth-status
    name: GH 登录状态
    category: gh
    platform: all
    exec:
      program: gh
      args:
        - auth
        - status
    adminRequired: false
    prerequisites:
      - id: gh
        type: binary
        required: true
        check: binary:gh
    tags:
      - gh
      - github
      - cli
      - auth
      - status
      - 登录
      - 状态
      - 查看
      - show
