name: Bug Report
description: Report a reproducible defect.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting.
        Please provide enough detail so maintainers can reproduce quickly.
  - type: input
    id: version
    attributes:
      label: Version / Tag
      placeholder: "e.g. v0.1.2"
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Windows x64
        - macOS arm64
        - Linux x64
        - Other
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction Steps
      description: Use numbered steps.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Logs / Screenshots
      description: Paste logs or attach screenshots if possible.
