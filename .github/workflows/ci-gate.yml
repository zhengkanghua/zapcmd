name: CI Gate

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ci-gate-${{ github.ref }}
  cancel-in-progress: true

# Windows desktop WebDriver smoke remains blocking.
# Controlled visual runner is the only blocking screenshot-level visual gate.
# macOS/Linux remain on cross-platform build/test/Rust smoke only.
jobs:
  quality-gate:
    name: Windows quality gate
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: 检查内置命令生成产物已同步提交
        run: |
          npm run commands:builtin:generate
          git diff --exit-code -- commands/catalog assets/runtime_templates/commands/builtin docs/generated_commands || (
            echo "检测到内置命令生成产物未同步提交。请在本地执行："
            echo "  npm run commands:builtin:generate"
            echo "然后提交生成产物："
            echo "  git add commands/catalog assets/runtime_templates/commands/builtin docs/generated_commands"
            exit 1
          )

      - name: Run quality gate
        run: npm run check:all

  desktop-e2e-smoke:
    name: Windows-only blocking desktop smoke
    runs-on: windows-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Install Windows desktop smoke WebDriver dependencies
        timeout-minutes: 20
        shell: pwsh
        run: |
          cargo install tauri-driver --locked
          pwsh -File scripts/e2e/install-msedgedriver.ps1 -Force

      - name: Run Windows-only blocking desktop E2E smoke
        run: npm run e2e:desktop:smoke

      - name: Resolve controlled runner browser contract
        shell: pwsh
        env:
          ZAPCMD_VISUAL_RUNNER_BROWSER_PATH: ${{ vars.ZAPCMD_VISUAL_RUNNER_BROWSER_PATH }}
          ZAPCMD_VISUAL_RUNNER_BROWSER_VERSION: ${{ vars.ZAPCMD_VISUAL_RUNNER_BROWSER_VERSION }}
        run: |
          $browserPath = $env:ZAPCMD_VISUAL_RUNNER_BROWSER_PATH
          if (-not $browserPath) {
            $candidates = @()

            try {
              $edgeCommand = Get-Command "msedge" -ErrorAction SilentlyContinue
              if ($edgeCommand -and $edgeCommand.Source) {
                $candidates += $edgeCommand.Source
              }
            } catch {}

            if ($env:ProgramFiles) {
              $candidates += (Join-Path $env:ProgramFiles "Microsoft\Edge\Application\msedge.exe")
            }

            if (${env:ProgramFiles(x86)}) {
              $candidates += (Join-Path ${env:ProgramFiles(x86)} "Microsoft\Edge\Application\msedge.exe")
            }

            foreach ($candidate in ($candidates | Where-Object { $_ } | Select-Object -Unique)) {
              if (Test-Path -LiteralPath $candidate) {
                $browserPath = (Resolve-Path -LiteralPath $candidate).Path
                break
              }
            }
          }

          if (-not $browserPath) {
            throw "未能解析 controlled-runner 浏览器路径。请设置仓库变量 ZAPCMD_VISUAL_RUNNER_BROWSER_PATH，或确认 Windows runner 已安装 Edge。"
          }

          $browserVersion = $env:ZAPCMD_VISUAL_RUNNER_BROWSER_VERSION
          if (-not $browserVersion) {
            try {
              $versionInfo = (Get-Item -LiteralPath $browserPath).VersionInfo
              foreach ($candidate in @($versionInfo.ProductVersion, $versionInfo.FileVersion)) {
                if ($candidate -match "(\d+\.\d+\.\d+\.\d+)") {
                  $browserVersion = $Matches[1]
                  break
                }
              }
            } catch {}
          }

          if (-not $browserVersion) {
            try {
              $probeOutput = (& $browserPath --version | Out-String).Trim()
              if ($probeOutput -match "(\d+\.\d+\.\d+\.\d+)") {
                $browserVersion = $Matches[1]
              }
            } catch {}
          }

          if (-not $browserVersion) {
            throw "未能解析 controlled-runner 浏览器版本。请设置仓库变量 ZAPCMD_VISUAL_RUNNER_BROWSER_VERSION。"
          }

          Add-Content -Path $env:GITHUB_ENV -Encoding utf8 -Value "ZAPCMD_VISUAL_RUNNER_BROWSER_PATH=$browserPath"
          Add-Content -Path $env:GITHUB_ENV -Encoding utf8 -Value "ZAPCMD_VISUAL_RUNNER_BROWSER_VERSION=$browserVersion"
          Write-Host "controlled-runner browser: $browserPath ($browserVersion)"

      - name: Run controlled visual regression gate
        # 优先使用仓库变量；若为空，则由前一步在 Windows runner 上探测 Edge 并导出契约。
        run: npm run test:visual:ui:runner

      - name: Upload Windows blocking desktop smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-blocking-desktop-e2e-smoke
          path: |
            .tmp/e2e/desktop-smoke/
            .tmp/e2e/visual-regression/
          if-no-files-found: warn

  cross-platform-smoke:
    name: Cross-platform build/test smoke (${{ matrix.os }})
    # macOS/Linux intentionally stop at build, test, and Rust smoke here.
    # This job does not represent a macOS desktop WebDriver smoke gate.
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - ubuntu-22.04

    runs-on: ${{ matrix.os }}
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install dependencies
        run: npm ci

      - name: Run cross-platform build/test smoke (no desktop WebDriver gate)
        run: npm run typecheck && npm run typecheck:test && npm run test:run && npm run build

      - name: Run Rust tests
        run: npm run test:rust
