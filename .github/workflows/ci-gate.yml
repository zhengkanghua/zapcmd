name: CI Gate

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ci-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: 检查内置命令生成产物已同步提交
        shell: pwsh
        run: |
          pwsh -File scripts/generate_builtin_commands.ps1

          git diff --exit-code -- assets/runtime_templates/commands/builtin docs/builtin_commands.generated.md
          if ($LASTEXITCODE -ne 0) {
            Write-Host "检测到内置命令生成产物未同步提交。请在本地执行："
            Write-Host "  pwsh -File scripts/generate_builtin_commands.ps1"
            Write-Host "然后提交生成产物："
            Write-Host "  git add assets/runtime_templates/commands/builtin docs/builtin_commands.generated.md"
            exit 1
          }

      - name: Run quality gate
        run: npm run check:all

  desktop-e2e-smoke:
    runs-on: windows-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Install WebDriver dependencies
        run: |
          cargo install tauri-driver --locked
          cargo install msedgedriver-tool --locked
          msedgedriver-tool install

      - name: Run desktop E2E smoke
        run: npm run e2e:desktop:smoke

      - name: Upload desktop E2E artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: desktop-e2e-smoke
          path: .tmp/e2e/desktop-smoke/
          if-no-files-found: warn

  cross-platform-smoke:
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - ubuntu-22.04

    runs-on: ${{ matrix.os }}
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run cross-platform smoke gate
        run: npm run typecheck && npm run typecheck:test && npm run test:run && npm run build
