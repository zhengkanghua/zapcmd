name: CI Gate

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ci-gate-${{ github.ref }}
  cancel-in-progress: true

# Windows desktop WebDriver smoke remains blocking.
# Controlled visual runner is the only blocking screenshot-level visual gate.
# macOS/Linux remain on cross-platform build/test/Rust smoke only.
jobs:
  quality-gate:
    name: Windows quality gate
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: 检查内置命令生成产物已同步提交
        shell: pwsh
        run: |
          pwsh -File scripts/generate_builtin_commands.ps1

          git diff --exit-code -- assets/runtime_templates/commands/builtin docs/builtin_commands.generated.md
          if ($LASTEXITCODE -ne 0) {
            Write-Host "检测到内置命令生成产物未同步提交。请在本地执行："
            Write-Host "  pwsh -File scripts/generate_builtin_commands.ps1"
            Write-Host "然后提交生成产物："
            Write-Host "  git add assets/runtime_templates/commands/builtin docs/builtin_commands.generated.md"
            exit 1
          }

      - name: Run quality gate
        run: npm run check:all

  desktop-e2e-smoke:
    name: Windows-only blocking desktop smoke
    runs-on: windows-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Install Windows desktop smoke WebDriver dependencies
        timeout-minutes: 20
        shell: pwsh
        run: |
          cargo install tauri-driver --locked
          pwsh -File scripts/e2e/install-msedgedriver.ps1 -Force

      - name: Run Windows-only blocking desktop E2E smoke
        run: npm run e2e:desktop:smoke

      - name: Run controlled visual regression gate
        # runner 环境必须提供：
        # - ZAPCMD_VISUAL_RUNNER_BROWSER_PATH
        # - ZAPCMD_VISUAL_RUNNER_BROWSER_VERSION
        env:
          ZAPCMD_VISUAL_RUNNER_BROWSER_PATH: ${{ vars.ZAPCMD_VISUAL_RUNNER_BROWSER_PATH }}
          ZAPCMD_VISUAL_RUNNER_BROWSER_VERSION: ${{ vars.ZAPCMD_VISUAL_RUNNER_BROWSER_VERSION }}
        run: npm run test:visual:ui:runner

      - name: Upload Windows blocking desktop smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-blocking-desktop-e2e-smoke
          path: |
            .tmp/e2e/desktop-smoke/
            .tmp/e2e/visual-regression/
          if-no-files-found: warn

  cross-platform-smoke:
    name: Cross-platform build/test smoke (${{ matrix.os }})
    # macOS/Linux intentionally stop at build, test, and Rust smoke here.
    # This job does not represent a macOS desktop WebDriver smoke gate.
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - ubuntu-22.04

    runs-on: ${{ matrix.os }}
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install dependencies
        run: npm ci

      - name: Run cross-platform build/test smoke (no desktop WebDriver gate)
        run: npm run typecheck && npm run typecheck:test && npm run test:run && npm run build

      - name: Run Rust tests
        run: npm run test:rust
