name: Release Dry Run Build (Windows x64)

on:
  workflow_dispatch:

concurrency:
  group: release-dry-run-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows-x64:
    runs-on: windows-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Build Windows x64 bundles (dry-run)
        run: npm run tauri:build:windows:x64

      - name: Upload dry-run artifacts (windows x64)
        uses: actions/upload-artifact@v4
        with:
          name: zapcmd-dryrun-windows-x64-bundle
          path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/
          if-no-files-found: error
