name: Release Build Matrix

on:
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: release-build-${{ github.ref }}
  cancel-in-progress: false

# Release gating keeps desktop WebDriver smoke on Windows only.
# macOS participates in bundle generation, not a blocking desktop smoke gate.
jobs:
  quality-gate:
    name: Windows release quality gate with desktop smoke
    runs-on: windows-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Run Windows release quality gate
        run: npm run check:all

      - name: 安装 Windows blocking 桌面 E2E WebDriver 依赖
        timeout-minutes: 20
        shell: pwsh
        run: |
          cargo install tauri-driver --locked
          pwsh -File scripts/e2e/install-msedgedriver.ps1 -Force

      - name: 运行 Windows-only release blocking 桌面端 E2E 冒烟
        run: npm run e2e:desktop:smoke

      - name: 上传 Windows blocking 桌面端 E2E 诊断产物
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-blocking-desktop-e2e-smoke
          path: .tmp/e2e/desktop-smoke/
          if-no-files-found: warn

  bundle:
    name: Multi-platform bundle build (${{ matrix.os }})
    needs: quality-gate
    # macOS only builds/signs bundles in this matrix.
    # It is not a separate release desktop smoke gate.
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: zapcmd-windows-bundle
          - os: macos-latest
            artifact_name: zapcmd-macos-bundle
          - os: ubuntu-22.04
            artifact_name: zapcmd-linux-bundle

    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install dependencies
        run: npm ci

      - name: Build all bundles
        run: npm run tauri:build:all

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: src-tauri/target/release/bundle/
          if-no-files-found: error

  publish-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: bundle
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate tag matches package version
        run: |
          set -euo pipefail
          tag_version="${GITHUB_REF_NAME#v}"
          package_version="$(node -e "const fs=require('node:fs'); const p=JSON.parse(fs.readFileSync('package.json','utf8')); process.stdout.write(p.version);")"
          if [ "$tag_version" != "$package_version" ]; then
            echo "Tag version ($tag_version) does not match package.json version ($package_version)."
            echo "Please update package.json only, then run sync via npm scripts before tagging."
            exit 1
          fi

      - name: Download bundle artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: zapcmd-*-bundle
          merge-multiple: true
          path: release-assets

      - name: Extract changelog entry for tag version
        id: changelog
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          output="release-assets/CHANGELOG_ENTRY.md"

          if ! grep -q "^## \[$version\]" CHANGELOG.md; then
            echo "Missing CHANGELOG entry for version [$version] in CHANGELOG.md"
            exit 1
          fi

          awk -v v="$version" '
            $0 ~ "^## \\[" v "\\]" { in_section=1; found=1; next }
            in_section && $0 ~ "^## \\[" { in_section=0 }
            in_section { print }
            END { if (!found) exit 2 }
          ' CHANGELOG.md > "$output"

          if ! grep -q '[^[:space:]]' "$output"; then
            echo "CHANGELOG entry for [$version] is empty"
            exit 1
          fi

          echo "path=$output" >> "$GITHUB_OUTPUT"

      - name: Collect release files
        id: collect
        run: |
          set -euo pipefail
          mapfile -t files < <(find release-assets -type f \( \
            -name "*.msi" -o \
            -name "*.exe" -o \
            -name "*.dmg" -o \
            -name "*.deb" -o \
            -name "*.rpm" -o \
            -name "*.AppImage" -o \
            -name "*.appimage" -o \
            -name "*.sig" -o \
            -name "latest.json" \
          \) | sort)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release files found under release-assets/"
            exit 1
          fi

          checksum_file="release-assets/SHA256SUMS"
          : > "$checksum_file"
          for file in "${files[@]}"; do
            hash="$(sha256sum "$file" | awk '{print $1}')"
            printf "%s  %s\n" "$hash" "$(basename "$file")" >> "$checksum_file"
          done

          {
            echo "files<<EOF"
            printf '%s\n' "${files[@]}"
            printf '%s\n' "$checksum_file"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: false
          body_path: ${{ steps.changelog.outputs.path }}
          overwrite_files: true
          files: ${{ steps.collect.outputs.files }}
